# Render Blueprint — free single-service deploy of AVTPP.
# Builds the Dockerfile (Express API + built React frontend) as ONE free web service.
# The database is a free external MySQL (Aiven / TiDB) — set DATABASE_URL in the
# dashboard after creating it (kept out of source on purpose).
services:
  - type: web
    name: avtpp
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Secrets generated by Render on first deploy
      - key: JWT_SECRET
        generateValue: true
      - key: GATE_API_KEY
        generateValue: true
      # Static config
      - key: DB_SSL
        value: "true"
      - key: FLUTTERWAVE_LIVE
        value: "false"
      - key: SEED_ON_START
        value: "true"
      # Set this manually in the Render dashboard to your free MySQL connection URL:
      #   mysql://USER:PASSWORD@HOST:PORT/DBNAME
      - key: DATABASE_URL
        sync: false
      # PORT is provided by Render automatically; the server reads process.env.PORT.
